<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TETORIS</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0e0f13; color: #e9e9ee;
    font-family: ui-monospace, monospace;
    display: flex; flex-direction: column; align-items: center;
    /* 모바일 브라우저 툴바 대응을 위해 vh 대신 가시 영역 활용 */
    height: 100vh; height: 100dvh;
    touch-action: none; overflow: hidden;
    -webkit-user-select: none; user-select: none;
    overscroll-behavior: none;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 360px; padding: 12px 16px 4px;
  }
  header .score { font-size: 14px; }
  header button {
    background: none; border: 1px solid #444; color: #e9e9ee;
    border-radius: 6px; padding: 6px 10px; font-family: inherit; font-size: 12px;
  }
  #board { border: 2px solid #333; background: #000; touch-action: none; display: block; }
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; text-align: center; padding: 20px;
    word-break: keep-all; z-index: 10;
  }
  #overlay.hide { display: none; }
  #overlay button {
    background: #00f0ff; color: #000; border: none; border-radius: 6px;
    padding: 12px 32px; font-weight: bold; font-family: inherit; font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <div class="score">SCORE <span id="score">0</span></div>
  <button id="bgmBtn">🔇 BGM</button>
</header>

<canvas id="board"></canvas>

<div id="overlay">
  <div style="font-size:24px; font-weight:bold;">TETORIS</div>
  <div style="font-size:14px; color:#aaa; line-height:1.6;">
    화면 탭: 회전<br>
    아래 스와이프: 하드드롭<br>
    좌우 스와이프: 이동
  </div>
  <button id="startBtn">START</button>
</div>

<audio id="bgm" src="bgm.mp3" loop></audio>

<script>
const COLS = 10, ROWS = 20;
let BLOCK = 24;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

function resize() {
  const header = document.querySelector('header');
  // 브라우저 툴바를 제외한 실제 가시 높이 확보
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const vw = window.innerWidth;
  
  // 헤더 높이와 여유 공간(40px)을 뺀 가용 영역 계산
  const availableWidth = Math.min(360, vw - 32);
  const availableHeight = vh - header.offsetHeight - 40;

  // 가로와 세로 중 좁은 쪽 기준으로 블록 크기 결정
  const blockW = Math.floor(availableWidth / COLS);
  const blockH = Math.floor(availableHeight / ROWS);
  
  BLOCK = Math.min(blockW, blockH);
  canvas.width = BLOCK * COLS;
  canvas.height = BLOCK * ROWS;
}

// 뷰포트 변경 시 즉시 대응
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', resize);
  window.visualViewport.addEventListener('scroll', resize);
}
window.addEventListener('resize', resize);
window.addEventListener('load', resize);

const COLORS = { I:'#00f0ff', O:'#fff000', T:'#c04cff', S:'#33ff77', Z:'#ff3333', J:'#3366ff', L:'#ff9933' };
const SHAPES = {
  I: [[1,1,1,1]], O: [[1,1],[1,1]], T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]], Z: [[1,1,0],[0,1,1]], J: [[1,0,0],[1,1,1]], L: [[0,0,1],[1,1,1]]
};
const KEYS = Object.keys(SHAPES);

let grid, current, score, running, dropCounter, dropInterval, lastTime;

function newGrid(){ return Array.from({length: ROWS}, () => Array(COLS).fill(null)); }
function randomPiece(){
  const k = KEYS[Math.floor(Math.random() * KEYS.length)];
  const shape = SHAPES[k].map(r => r.slice());
  return { shape, color: COLORS[k], x: Math.floor(COLS/2) - Math.ceil(shape[0].length/2), y: 0 };
}
function rotate(shape){
  const rows = shape.length, cols = shape[0].length;
  const res = Array.from({length: cols}, () => Array(rows).fill(0));
  for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) res[x][rows - 1 - y] = shape[y][x];
  return res;
}
function collide(shape, ox, oy){
  for (let y = 0; y < shape.length; y++){
    for (let x = 0; x < shape[y].length; x++){
      if (!shape[y][x]) continue;
      const gx = ox + x, gy = oy + y;
      if (gx < 0 || gx >= COLS || gy >= ROWS) return true;
      if (gy >= 0 && grid[gy][gx]) return true;
    }
  }
  return false;
}
function merge(){
  const { shape, color, x, y } = current;
  for (let sy = 0; sy < shape.length; sy++)
    for (let sx = 0; sx < shape[sy].length; sx++)
      if (shape[sy][sx] && y + sy >= 0) grid[y + sy][x + sx] = color;
}
function clearLines(){
  let cleared = 0;
  outer: for (let y = ROWS - 1; y >= 0; y--){
    for (let x = 0; x < COLS; x++) if (!grid[y][x]) continue outer;
    grid.splice(y, 1); grid.unshift(Array(COLS).fill(null));
    cleared++; y++;
  }
  if (cleared){
    score += [0, 100, 300, 500, 800][cleared];
    document.getElementById('score').textContent = score;
  }
}
function spawn(){
  current = randomPiece();
  if (collide(current.shape, current.x, current.y)){
    running = false; showOverlay('GAME OVER', `SCORE: ${score}`);
  }
}
function move(dx){ if (!collide(current.shape, current.x + dx, current.y)) current.x += dx; }
function softDrop(){
  if (!collide(current.shape, current.x, current.y + 1)){ current.y++; }
  else { merge(); clearLines(); spawn(); }
}
function hardDrop(){
  while (!collide(current.shape, current.x, current.y + 1)) current.y++;
  merge(); clearLines(); spawn();
}
function rotatePiece(){
  const rotated = rotate(current.shape);
  if (!collide(rotated, current.x, current.y)) current.shape = rotated;
  else if (!collide(rotated, current.x - 1, current.y)) { current.x--; current.shape = rotated; }
  else if (!collide(rotated, current.x + 1, current.y)) { current.x++; current.shape = rotated; }
}
function draw(){
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) if (grid[y][x]) drawCell(x, y, grid[y][x]);
  const { shape, color, x, y } = current;
  for (let sy = 0; sy < shape.length; sy++) for (let sx = 0; sx < shape[sy].length; sx++) if (shape[sy][sx] && y + sy >= 0) drawCell(x + sx, y + sy, color);
}
function drawCell(x, y, color){ ctx.fillStyle = color; ctx.fillRect(x * BLOCK, y * BLOCK, BLOCK - 1, BLOCK - 1); }
function update(time = 0){
  if (!running) return;
  const delta = time - lastTime; lastTime = time;
  dropCounter += delta;
  if (dropCounter > dropInterval){ softDrop(); dropCounter = 0; }
  draw(); requestAnimationFrame(update);
}
function showOverlay(title, sub){
  const ov = document.getElementById('overlay');
  ov.innerHTML = `<div style="font-size:22px;font-weight:bold;">${title}</div>
                   <div style="font-size:13px;color:#999;margin:10px 0;">${sub || ''}</div>
                   <button id="startBtn">RESTART</button>`;
  ov.classList.remove('hide');
  document.getElementById('startBtn').addEventListener('click', startGame);
}
function startGame(){
  grid = newGrid(); score = 0; running = true;
  dropCounter = 0; dropInterval = 600; lastTime = 0;
  document.getElementById('score').textContent = 0;
  spawn(); document.getElementById('overlay').classList.add('hide');
  requestAnimationFrame(update);
}
document.getElementById('startBtn').addEventListener('click', startGame);

let touchStartX = 0, touchStartY = 0, moved = false;
const SWIPE_THRESHOLD = 24;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!running) return;
  const t = e.touches[0]; touchStartX = t.clientX; touchStartY = t.clientY; moved = false;
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!running) return;
  const t = e.touches[0];
  const dx = t.clientX - touchStartX; const dy = t.clientY - touchStartY;
  if (Math.abs(dx) > SWIPE_THRESHOLD) { move(dx > 0 ? 1 : -1); touchStartX = t.clientX; moved = true; }
  if (dy > SWIPE_THRESHOLD * 3) { hardDrop(); touchStartY = t.clientY; moved = true; }
}, { passive: false });
canvas.addEventListener('touchend', (e) => { if (!moved && running) rotatePiece(); }, { passive: false });

const bgm = document.getElementById('bgm'), bgmBtn = document.getElementById('bgmBtn');
let bgmOn = false;
bgmBtn.addEventListener('click', () => {
  bgmOn = !bgmOn;
  if (bgmOn){ bgm.play().catch(() => {}); bgmBtn.textContent = '🔊 BGM'; }
  else { bgm.pause(); bgmBtn.textContent = '🔇 BGM'; }
});
</script>
</body>
</html>
